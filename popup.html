<!DOCTYPE html>
    <html>

    <head>
        <meta charset="utf-8">
        <title>Modrinth Auto Filter</title>
        <style>
            :root {
            --primary: #1bd96a;
            --primary-hover: #15b356;
            --bg: #1e1e2e;
            --surface: #2b2b3b;
            --text: #e2e8f0;
            --border: #3f3f5a;
            }

            body {
            width: 320px;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            }

            h1 {
            font-size: 18px;
            margin: 0 0 20px 0;
            text-align: center;
            font-weight: 600;
            }

            .form-group {
            margin-bottom: 16px;
            }

            label.title {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #a0aec0;
            font-weight: 600;
            }

            select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--surface);
            color: var(--text);
            font-size: 14px;
            outline: none;
            appearance: none;
            cursor: pointer;
            }
            
            select:focus {
            border-color: var(--primary);
            }

            .toggle-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px;
            background-color: var(--surface);
            border-radius: 8px;
            }

            .toggle-container span {
            font-weight: 600;
            font-size: 14px;
            }

            .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
            }

            .switch input {
            opacity: 0;
            width: 0;
            height: 0;
            }

            .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #4a5568;
            transition: .3s;
            border-radius: 24px;
            }

            .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
            }

            input:checked + .slider {
            background-color: var(--primary);
            }

            input:checked + .slider:before {
            transform: translateX(20px);
            }

            button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background-color 0.2s;
            margin-top: 10px;
            }

            button:hover {
            background-color: var(--primary-hover);
            }

            #status {
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            color: var(--primary);
            height: 15px;
            }
        </style>
    </head>

    <body>
        <h1>Modrinth Auto Filter</h1>

        <div class="toggle-container">
            <span>機能を有効にする</span>
            <label class="switch">
            <input type="checkbox" id="isEnabled">
            <span class="slider"></span>
            </label>
        </div>

        <div class="form-group">
            <label class="title" for="platform">Platform</label>
            <select id="platform">
            <option value="">(指定なし)</option>
            <option value="fabric">Fabric</option>
            <option value="forge">Forge</option>
            <option value="neoforge">NeoForge</option>
            <option value="quilt">Quilt</option>
            </select>
        </div>

        <div class="form-group">
            <label class="title" for="channel">Version Channel</label>
            <select id="channel">
            <option value="release">Release</option>
            <option value="beta">Beta</option>
            <option value="alpha">Alpha (Snapshot)</option>
            </select>
        </div>

        <div class="form-group">
            <label class="title" for="version">Minecraft Version</label>
            <select id="version">
            <option value="">読込中...</option>
            </select>
        </div>

        <button id="saveBtn">設定を保存</button>
        <div id="status"></div>

        <script src="popup.js"></script>
    </body>
</html>
